services:
  db:
    image: postgres:16-alpine
    container_name: carpet_crm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: carpet
      POSTGRES_PASSWORD: carpet
      POSTGRES_DB: carpet_crm
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carpet -d carpet_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:16-alpine
    container_name: carpet_crm_test_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: carpet
      POSTGRES_PASSWORD: carpet
      POSTGRES_DB: carpet_crm_test
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carpet -d carpet_crm_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: carpet_crm_bot
    restart: unless-stopped
    command: python -m carpet_crm.bot.main
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://carpet:carpet@db:5432/carpet_crm
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
