services:
  db:
    image: postgres:16-alpine
    container_name: carpet_crm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: carpet
      POSTGRES_PASSWORD: carpet
      POSTGRES_DB: carpet_crm
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carpet -d carpet_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: